name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install orchestrator deps
        run: |
          python -m pip install --upgrade pip
          pip install -r services/orchestrator/requirements.txt

      - name: Validate orchestrator import
        run: |
          python -c "from services.orchestrator.app.main import app; print(app.title)"

      - name: Syntax check
        run: |
          python -m compileall services/orchestrator/app

