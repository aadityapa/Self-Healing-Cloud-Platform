services:
  - type: web
    runtime: python
    name: nexovo-helling-orchestrator
    rootDir: services/orchestrator
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
