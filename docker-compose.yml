services:
  orchestrator:
    build:
      context: ./services/orchestrator
    container_name: shp-orchestrator
    ports:
      - "8000:8000"
    networks:
      - shp-net
    restart: unless-stopped

  dashboard:
    build:
      context: ./tools/dashboard
    container_name: shp-dashboard
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:8000
    ports:
      - "8501:8501"
    depends_on:
      - orchestrator
    networks:
      - shp-net
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: shp-prometheus
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - orchestrator
    networks:
      - shp-net
    restart: unless-stopped

networks:
  shp-net:
    driver: bridge
